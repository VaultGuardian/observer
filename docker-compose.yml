services:
  # ---- VaultGuardian Observer ----
  # Watches container logs, classifies threats via LLM, captures HTTP
  # response evidence, and alerts on confirmed malicious activity.
  observer:
    build: .
    container_name: vg-observer
    restart: unless-stopped
    environment:
      # ── Core ──
      - DOCKER_SOCKET=/var/run/docker.sock
      - DATA_DIR=/data
      - LLM_URL=http://llm:11434   # Ollama's default port
      - LLM_MODEL=qwen2.5:7b       # Small, fast, good at structured output
      - EXCLUDE_CONTAINERS=vg-observer,vg-llm
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-}
      - ALERT_EMAIL_FROM=VaultGuardian <alerts@vaultdec.com>
      # ── Notifications ──
      # Each channel auto-enables when its required env var(s) are set.
      # No enable/disable flags needed — presence of the key IS the toggle.
      #
      # Webhook (Slack, Discord, Teams, PagerDuty, Zapier, n8n, etc.)
      # - WEBHOOK_URL=https://hooks.slack.com/services/T00/B00/xxxxx
      # - WEBHOOK_HEADERS=Authorization=Bearer mytoken   # optional
      #
      # Email (via Resend)
      # - RESEND_API_KEY=re_xxxxxxxxxxxxx
      # - ALERT_EMAIL_TO=team@company.com
      # - ALERT_EMAIL_FROM=VaultGuardian <alerts@yourdomain.com>   # optional
      #
      # SMS (via Twilio)
      # - TWILIO_SID=ACxxxxxxxxxxxxx
      # - TWILIO_AUTH_TOKEN=xxxxxxxxxxxxxxxx
      # - TWILIO_FROM=+15551234567
      # - ALERT_SMS_TO=+15559876543
      #
      # Apple Push (APNs)
      # - APNS_KEY_PATH=/secrets/AuthKey_XXXXXXXXXX.p8
      # - APNS_KEY_ID=XXXXXXXXXX
      # - APNS_TEAM_ID=XXXXXXXXXX
      # - APNS_BUNDLE_ID=com.yourcompany.app
      # - APNS_DEVICE_TOKEN=xxxxxxxxxxxxxxxxxxxxxxxx
      # - APNS_PRODUCTION=false     # set true for production APNs gateway
      #
      # Android Push (FCM v1)
      # - FCM_CREDENTIALS_PATH=/secrets/firebase-sa.json
      # - FCM_PROJECT_ID=your-project-id     # auto-detected from credentials if omitted
      # - FCM_DEVICE_TOKEN=xxxxxxxxxxxxxxxxxxxxxxxx
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Read-only Docker socket
      - observer-data:/data                            # Persist pattern store + notification config
      # Mount secrets for push notifications (if using APNs/FCM):
      # - ./secrets:/secrets:ro
    depends_on:
      - llm
    networks:
      - vg-internal

  # ---- Local LLM Inference (Ollama) ----
  # Runs a quantized 7B model for log analysis.
  # Swap this for llama.cpp server, vLLM, or any OpenAI-compatible endpoint.
  llm:
    image: ollama/ollama:latest
    container_name: vg-llm
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"  # Expose for debugging; remove in production
    networks:
      - vg-internal

  # ---- Example: a dummy web app to generate logs ----
  # Replace with your actual services.
  demo-app:
    image: nginx:alpine
    container_name: demo-nginx
    ports:
      - "8080:80"
    networks:
      - vg-internal

volumes:
  observer-data:
  ollama-models:

networks:
  vg-internal:
    driver: bridge
